<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>MyChat</title>

<link rel="stylesheet" href="../css/home.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

.tabs{
display:flex;
gap:10px;
margin-top:10px;
}

.tabs div{
padding:6px 12px;
background:#eee;
border-radius:6px;
cursor:pointer;
}

.tabs .active{
background:#3498db;
color:white;
}

.post button{
margin-top:8px;
margin-right:6px;
padding:5px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.editBtn{
background:#3498db;
color:white;
}

.deleteBtn{
background:#e74c3c;
color:white;
}

.post{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.post-header{
display:flex;
align-items:center;
margin-bottom:8px;
}

.post-avatar{
width:35px;
height:35px;
border-radius:50%;
background:#3498db;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:8px;
overflow:hidden;
}

.post-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.post-user{
font-weight:bold;
}

.post-content{
margin:8px 0;
font-size:14px;
}

.friend{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.friend:hover{
background:#f0f0f0;
}

.profileBtn{
margin-left:auto;
margin-right:5px;
background:#6c5ce7;
border:none;
color:white;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

.profileBtn:hover{
background:#5848d6;
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2 class="logo">💬 MyChat</h2>

<div class="profile-card">

<div class="avatar" id="avatar">U</div>

<!-- INPUT UPLOAD AVATAR -->
<input type="file" id="avatarInput" hidden accept="image/*">

<div class="profile-info">
<div class="username" id="username">User</div>
<span class="status">online</span>
</div>

<button class="profileBtn" onclick="openProfile()">Profile</button>

<button class="logout" onclick="logout()">Logout</button>

</div>

<input class="search" id="searchInput" placeholder="Search friends...">

<div class="tabs">
<div id="tabFriends" class="active" onclick="showFriends()">Friends</div>
<div id="tabGroups" onclick="showGroups()">Groups</div>
</div>

<div id="friendsBox"></div>

<div id="groupsBox" style="display:none">

<button id="createGroupBtn" onclick="createGroup()">+ Create Group</button>

<div id="groupList"></div>

</div>

</div>

<div class="feed">

<div class="post-box">

<textarea id="postInput" placeholder="What's on your mind?"></textarea>

<button class="post-btn" onclick="createPost()">Post</button>

</div>

<div id="posts"></div>

</div>

<div class="chat">

<div class="chat-header">
<span id="chatTitle">Select a friend to start chatting</span>

<button id="memberBtn" onclick="viewGroupMembers()" style="margin-left:10px;display:none">
Members
</button>
</div>

<div id="messages" class="messages"></div>

<div class="chat-input">

<input id="msgInput" placeholder="Type message...">

<button onclick="sendMsg()">Send</button>

</div>

</div>

</div>

<script>

let currentUser=null
let currentChat=null
let currentGroup = null
let unread = {}
let lastPrivateMsgId = 0
let lastGroupMsgId = 0

function loadUser(){

const user=JSON.parse(localStorage.getItem("user"))

if(!user){

window.location="login.html"
return

}

currentUser=user

document.getElementById("username").innerText=user.username

if(user.avatar){
document.getElementById("avatar").innerHTML="<img src='"+user.avatar+"' style='width:100%;height:100%;border-radius:50%'>"
}else{
document.getElementById("avatar").innerText=user.username[0].toUpperCase()
}

}


/* CLICK AVATAR -> CHỌN ẢNH */

document.addEventListener("DOMContentLoaded",()=>{

document.getElementById("avatar").onclick=()=>{

document.getElementById("avatarInput").click()

}

})


/* UPLOAD AVATAR */

document.getElementById("avatarInput").addEventListener("change",async function(){

const file=this.files[0]

if(!file) return

const formData=new FormData()

formData.append("avatar",file)
formData.append("userId",currentUser.id)

const res=await fetch("/api/users/avatar",{
method:"POST",
body:formData
})

const data=await res.json()

currentUser.avatar=data.avatar

localStorage.setItem("user",JSON.stringify(currentUser))

document.getElementById("avatar").innerHTML=
"<img src='"+data.avatar+"' style='width:100%;height:100%;border-radius:50%'>"

})


function openProfile(){

window.location="profile.html"

}


function showFriends(){

document.getElementById("friendsBox").style.display="block"
document.getElementById("groupsBox").style.display="none"

document.getElementById("tabFriends").classList.add("active")
document.getElementById("tabGroups").classList.remove("active")

}

function showGroups(){

document.getElementById("friendsBox").style.display="none"
document.getElementById("groupsBox").style.display="block"

document.getElementById("tabGroups").classList.add("active")
document.getElementById("tabFriends").classList.remove("active")

loadGroups()

}


async function loadFriends(){

const res=await fetch("/api/friends?userId="+currentUser.id)

const data=await res.json()

const box=document.getElementById("friendsBox")

box.innerHTML=""

data.forEach(u=>{

const div=document.createElement("div")

div.className="friend"
let avatar = u.avatar
? `<img src="${u.avatar}" style="width:30px;height:30px;border-radius:50%;margin-right:8px">`
: `<div style="width:30px;height:30px;border-radius:50%;background:#3498db;color:white;display:flex;align-items:center;justify-content:center;margin-right:8px">${u.username[0]}</div>`

div.innerHTML = `
<div style="display:flex;align-items:center;width:100%">
${avatar}
<span style="margin-left:6px">${u.username}</span>

<span class="badge" id="badge-${u.id}" style="margin-left:auto"></span>
</div>
`

div.onclick=()=>openChat(u.id,u.username)

box.appendChild(div)

})

}


async function createGroup(){

const name=prompt("Group name")

if(!name)return

await fetch("/api/groups",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
owner_id:currentUser.id
})

})

loadGroups()

}


async function loadGroups(){

const res=await fetch("/api/groups?userId="+currentUser.id)

const data=await res.json()

const box=document.getElementById("groupList")

box.innerHTML=""

data.forEach(g=>{

const div=document.createElement("div")

div.className="friend"

div.innerHTML = `
<span onclick="openGroupChat(${g.id}, \`${g.name}\`)" style="cursor:pointer">
${g.name}
</span>

<button onclick="openAddMember(${g.id})" style="margin-left:10px">
Add Member
</button>
`

box.appendChild(div)

})

}


function openChat(id,username){

currentChat=id
currentGroup=null

document.getElementById("chatTitle").innerText=
"Chatting with "+username

document.getElementById("memberBtn").style.display="none"

loadMessages(id)
unread[id]=0

const badge=document.getElementById("badge-"+id)

if(badge){
badge.style.display="none"
}
}

function openGroupChat(groupId,groupName){

currentGroup = groupId
currentChat = null

document.getElementById("chatTitle").innerText =
"Group: " + groupName

document.getElementById("memberBtn").style.display="inline-block"

loadGroupMessages()

}

async function viewGroupMembers(){

if(!currentGroup) return

const res = await fetch("/api/groups/members/"+currentGroup)

const data = await res.json()

let list="Members:\n\n"

data.forEach(u=>{
list+=u.username+"\n"
})

alert(list)

}

async function loadMessages(friendId){

const res=await fetch(`/api/chat/${currentUser.id}/${friendId}`)

const data=await res.json()
if(data.length>0){

const last=data[data.length-1]

if(last.id > lastPrivateMsgId){

lastPrivateMsgId = last.id

if(last.sender_id != currentUser.id){

showNotification("New message from "+last.username)

if(!unread[last.sender_id]){
unread[last.sender_id]=0
}

unread[last.sender_id]++

const badge=document.getElementById("badge-"+last.sender_id)

if(badge){
badge.style.display="inline-block"
badge.innerText=unread[last.sender_id]
}

}

}

}

const box=document.getElementById("messages")

box.innerHTML=""

data.forEach(m=>{

const sender=m.sender_id==currentUser.id?"Me:":m.username+":"

box.innerHTML+=`
<div class="msg-row ${m.sender_id==currentUser.id ? 'my-msg' : ''}">

<div class="msg-avatar">
${m.avatar 
? `<img src="${m.avatar}">`
: `<div class="avatar-default">${m.username[0]}</div>`
}
</div>

<div class="msg-content">

<b>${sender}</b> ${m.message}

${m.sender_id==currentUser.id ? `
<span class="menu-icon" onclick="toggleMenu(${m.id})">⋮</span>

<div class="menu-actions" id="menu-${m.id}">
<button onclick="editMsg(${m.id})">Edit</button>
<button onclick="deleteMsg(${m.id})">Delete</button>
</div>
` : ``}

</div>

</div>
`

})



}

async function loadGroupMessages(){

const res = await fetch("/api/chat/group/"+currentGroup)

const data = await res.json()
if(data.length>0){

const last=data[data.length-1]

if(last.id > lastGroupMsgId){

lastGroupMsgId = last.id

if(last.sender_id != currentUser.id){
showNotification("New message in group")
}

}

}

const box=document.getElementById("messages")

box.innerHTML=""

data.forEach(m=>{

const sender = m.sender_id==currentUser.id ? "Me:" : m.username+":"

box.innerHTML+=`
<div class="msg-row ${m.sender_id==currentUser.id ? 'my-msg' : ''}">

<div class="msg-avatar">
${m.avatar 
? `<img src="${m.avatar}">`
: `<div class="avatar-default">${m.username[0]}</div>`
}
</div>

<div class="msg-content">

<b>${sender}</b> ${m.message}

${m.sender_id==currentUser.id ? `
<span class="menu-icon" onclick="toggleMenu(${m.id})">⋮</span>

<div class="menu-actions" id="menu-${m.id}">
<button onclick="editMsg(${m.id})">Edit</button>
<button onclick="deleteMsg(${m.id})">Delete</button>
</div>
` : ``}

</div>

</div>
`

})
if(data.length>0){

const last=data[data.length-1]

if(last.sender_id!=currentUser.id && currentChat!=last.sender_id){

if(!unread[last.sender_id]){
unread[last.sender_id]=0
}

unread[last.sender_id]++

const badge=document.getElementById("badge-"+last.sender_id)

if(badge){
badge.style.display="inline-block"
badge.innerText=unread[last.sender_id]
}

}

}

}
async function sendMsg(){

const msg=document.getElementById("msgInput").value
if(!msg) return

/* CHAT FRIEND */

if(currentChat){

await fetch("/api/chat/send",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
sender_id:currentUser.id,
receiver_id:currentChat,
message:msg
})

})

loadMessages(currentChat)

}

/* CHAT GROUP */

else if(currentGroup){

await fetch("/api/chat/group/send",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
sender_id:currentUser.id,
group_id:currentGroup,
message:msg
})

})

lastGroupMsgId = 0
loadGroupMessages()

}

else{

alert("Select friend or group first")

}

document.getElementById("msgInput").value=""

}


async function createPost(){

const text=document.getElementById("postInput").value

if(!text)return

await fetch("/api/posts",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:currentUser.id,
content:text

})

})

document.getElementById("postInput").value=""

loadPosts()

}


async function deletePost(id){

if(!confirm("Delete post?")) return

await fetch("/api/posts/"+id+"?user_id="+currentUser.id,{
method:"DELETE"
})

loadPosts()

}


async function editPost(id){

const post=document.getElementById("post-"+id)

const oldText=post.querySelector(".post-content").innerText

const text=prompt("Edit post",oldText)

if(text===null) return

await fetch("/api/posts/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
content:text,
user_id:currentUser.id
})

})

loadPosts()

}


async function loadPosts(){

const res=await fetch("/api/posts")

const data=await res.json()

const box=document.getElementById("posts")

box.innerHTML=""

data.forEach(p=>{

let avatar=p.avatar
? `<img src="${p.avatar}">`
: p.username[0]

box.innerHTML+=`
<div class="post" id="post-${p.id}">

<div class="post-header">

<div class="post-avatar">${avatar}</div>

<div>
<div class="post-user">${p.username}</div>
</div>

</div>

<div class="post-content">${p.content}</div>

${p.user_id==currentUser.id ? `
<button class="editBtn" onclick="editPost(${p.id})">Edit</button>
<button class="deleteBtn" onclick="deletePost(${p.id})">Delete</button>
` : ``}

</div>
`

})

}


function logout(){

localStorage.removeItem("user")

window.location="login.html"

}



async function openAddMember(groupId){

currentGroup = groupId

const res = await fetch("/api/friends?userId="+currentUser.id)
const friends = await res.json()

const box = document.getElementById("friendList")

box.innerHTML=""

friends.forEach(f=>{

box.innerHTML += `
<div style="display:flex;justify-content:space-between;margin-bottom:8px">
<span>${f.username}</span>
<button onclick="addToGroup(${f.id})">Add</button>
</div>
`

})

document.getElementById("addMemberModal").style.display="flex"

}

async function addToGroup(userId){

await fetch("/api/groups/addMember",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
group_id:currentGroup,
user_id:userId
})

})

alert("Member added!")

}

function closeAddMember(){

document.getElementById("addMemberModal").style.display="none"

}

loadUser()
loadFriends()
loadPosts()

document.getElementById("searchInput").addEventListener("input",function(){

const keyword=this.value.toLowerCase()

const friends=document.querySelectorAll("#friendsBox .friend")

friends.forEach(f=>{

const name=f.innerText.toLowerCase()

if(name.includes(keyword)){
f.style.display="block"
}else{
f.style.display="none"
}

})

})

setInterval(()=>{

if(currentChat){
loadMessages(currentChat)
}

if(currentGroup){
loadGroupMessages()
}

},2000)


function toggleMenu(id){

const menu=document.getElementById("menu-"+id)

if(menu.style.display==="block"){
menu.style.display="none"
}else{
menu.style.display="block"
}

}

async function editMsg(id){

const text=prompt("Edit message")

if(!text) return

await fetch("/api/chat/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text,
user_id:currentUser.id
})

})

if(currentChat){
loadMessages(currentChat)
}else{
loadGroupMessages()
}

}

async function deleteMsg(id){

if(!confirm("Delete message?")) return

await fetch("/api/chat/"+id+"?user_id="+currentUser.id,{
method:"DELETE"
})

if(currentChat){
loadMessages(currentChat)
}else{
loadGroupMessages()
}

}
function showNotification(text){

const noti=document.createElement("div")

noti.innerText=text

noti.style.position="fixed"
noti.style.bottom="20px"
noti.style.right="20px"
noti.style.background="#3498db"
noti.style.color="white"
noti.style.padding="10px 15px"
noti.style.borderRadius="8px"
noti.style.boxShadow="0 2px 6px rgba(0,0,0,0.2)"

document.body.appendChild(noti)

setTimeout(()=>{
noti.remove()
},3000)

}
</script>


<div id="addMemberModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
">

<div style="
background:white;
padding:20px;
border-radius:10px;
width:300px;
max-height:400px;
overflow:auto;
">

<h3>Add Member</h3>

<div id="friendList"></div>

<button onclick="closeAddMember()">Close</button>

</div>
</div>
<script src="../js/chat.js"></script>

</body>
</html>
